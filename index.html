<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal GTE - Estándar HDC 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; padding: 40px; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h1 { color: #003366; border-bottom: 2px solid #FF6600; padding-bottom: 10px; }
        .btn-validar { background-color: #FF6600; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; }
        .btn-validar:hover { background-color: #e65c00; }
        #resultado { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Guacara Te Escucha</h1>
    <p><strong>Estándar HDC 2026</strong> | Validación de Indicadores</p>
    
    <div style="margin-bottom: 20px;">
        <label>Edad del Paciente:</label><br>
        <input type="number" id="edad-paciente" placeholder="Ej. 15" style="width: 100%; padding: 10px; margin-top: 5px;">
    </div>

    <button class="btn-validar" id="boton-validar">
        VALIDAR DIAGNÓSTICO HDC 2026
    </button>

    <div id="resultado"></div>
</div>

<script type="module">
    // IMPORTANTE: Aquí conectamos con el motor que ya creaste en /lib
    import { calcularFaseGTE } from './lib/motor-clinico-gte.js';

    document.getElementById('boton-validar').addEventListener('click', () => {
        const edad = parseInt(document.getElementById('edad-paciente').value);
        const divResultado = document.getElementById('resultado');

        // Simulamos respuestas para probar que el motor funciona
        // En el siguiente paso conectaremos los inputs reales
        const respuestasSimuladas = []; 

        if (!edad) {
            alert("Por favor, ingrese la edad del paciente.");
            return;
        }

        // Llamamos al motor clínico
        const fase = calcularFaseGTE(edad, respuestasSimuladas);

        // Mostramos el resultado con armonía visual
        divResultado.style.display = 'block';
        divResultado.style.backgroundColor = '#e0f2fe';
        divResultado.style.color = '#003366';
        divResultado.innerText = "SISTEMA HDC 2026: El paciente ha sido clasificado en " + fase;
    });
</script>

</body>
</html>
