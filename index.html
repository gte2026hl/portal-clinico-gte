<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal GTE - Inteligencia Clínica HDC 2026</title>
    <style>
        :root { --blue: #003366; --orange: #FF6600; --slate: #64748b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); padding: 20px; color: #1e293b; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h1 { color: var(--blue); border-left: 5px solid var(--orange); padding-left: 15px; margin: 0 0 10px 0; font-size: 26px; }
        .header-tag { font-size: 11px; font-weight: bold; color: var(--slate); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; }
        .input-group { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        label { font-weight: 700; color: var(--blue); margin-bottom: 10px; display: block; }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        .pregunta-card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 15px; border-radius: 10px; }
        .pregunta-texto { font-weight: 500; margin-bottom: 15px; line-height: 1.5; font-size: 15px; }
        select, input[type="range"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; }
        .btn-validar { background: var(--blue); color: white; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; font-size: 16px; margin-top: 25px; transition: all 0.3s; }
        .btn-validar:hover { background: var(--orange); }
        .btn-reset { background: #e2e8f0; color: #64748b; padding: 12px; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        .btn-reset:hover { background: var(--blue); }
        #resultado { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; text-align: center; border: 2px solid transparent; }
        .fase-3 { background: #fef2f2; border-color: #f87171; color: #991b1b; }
        .fase-otras { background: #f0fdf4; border-color: #4ade80; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <span class="header-tag">Sistema de Inteligencia Autogestionada</span>
    <h1>Guacara Te Escucha</h1>
    <p style="color: var(--slate); margin-bottom: 25px; font-size: 14px;">Protocolo Clínico Estandarizado                                                             HDC2026</p>
    
    <div class="input-group">
        <label for="edad-paciente">Edad del Paciente (9 a 17 años):</label>
        <input type="number" id="edad-paciente" min="9" max="17" placeholder="Ingrese edad">
    </div>

    <div id="area-cuestionario"></div>

    <button class="btn-validar" id="boton-validar">VALIDAR DIAGNÓSTICO PROFESIONAL</button>
    <button class="btn-reset" onclick="location.reload()">NUEVA CONSULTA</button>

    <div id="resultado"></div>
</div>

<script type="module">
    import { calcularFaseGTE } from './lib/motor-clinico-gte.js';

    const bancosPreguntas = {
        "9-11": [
            { id: 1, p: "¿Me siento tranquilo(a).?", critico: false },
            { id: 2, p: "¿Me siento triste sin saber por qué.?", critico: true },
            { id: 3, p: "¿Me enojo muy rápido.?", critico: true },
            { id: 4, p: "¿Ya no disfruto las cosas que antes me gustaban.?", critico: true },
            { id: 5, p: "¿Me gusta jugar o hablar con mis amigos.?", critico: false },
            { id: 6, p: "¿Prefiero estar solo(a).?", critico: true },
            { id: 7, p: "¿Me siento bien en mi salón.?", critico: false },
            { id: 8, p: "¿Siento que nadie quiere jugar conmigo.?", critico: true },
            { id: 9, p: "¿En casa puedo hablar de lo que siento.?", critico: false },
            { id: 10, p: "¿A veces siento que no me escuchan.?", critico: true },
            { id: 11, p: "¿Me preocupa que algo malo pase en casa.?", critico: true },
            { id: 12, p: "¿Me gusta dibujar o jugar para expresar lo que siento.?", critico: false },
            { id: 13, p: "¿A veces no sé cómo decir lo que siento.?", critico: true }
        ],
        "12-14": [
            { id: 1, p: "Me siento triste sin saber por qué.", critico: true },
            { id: 2, p: "Me enojo con facilidad.", critico: true },
            { id: 3, p: "Me siento sin energía.", critico: true },
            { id: 4, p: "Siento que nada me sale bien.", critico: true },
            { id: 5, p: "Me siento excluido(a).", critico: true },
            { id: 6, p: "Evito hablar con mis compañeros.", critico: true },
            { id: 7, p: "Me cuesta hacer amigos.", critico: true },
            { id: 8, p: "Siento que no encajo.", critico: true },
            { id: 9, p: "Me cuesta concentrarme.", critico: false },
            { id: 10, p: "Mis notas han bajado.", critico: false },
            { id: 11, p: "Me siento nervioso(a) en la escuela.", critico: false },
            { id: 12, p: "En casa puedo hablar de mis problemas.", critico: false, inverso: true },
            { id: 13, p: "Siento que mis emociones molestan.", critico: false },
            { id: 14, p: "Me siento solo(a) incluso acompañado(a).", critico: false },
            { id: 15, p: "Me siento inseguro (a) en mi hogar.", critico: false }
        ],
        "15-17": [
            { id: 1, p: "Tengo cambios de ánimo fuertes", critico: true },
            { id: 2, p: "Me siento desconectado(a).", critico: true },
            { id: 3, p: "Ya no disfruto actividades.", critico: true },
            { id: 4, p: "Me siento abrumado(a).", critico: true },
            { id: 5, p: "Prefiero estar solo(a).", critico: true },
            { id: 6, p: "Siento que no tengo a quién acudir.", critico: true },
            { id: 7, p: "Me cuesta confiar en otros.", critico: true },
            { id: 8, p: "He perdido interés en mis estudios.", critico: false },
            { id: 9, p: "Me cuesta concentrarme.", critico: false },
            { id: 10, p: "Me siento presionado(a).", critico: false },
            { id: 11, p: "Siento que en casa no me entienden.", critico: false },
            { id: 12, p: "Evito hablar de mis emociones.", critico: false },
            { id: 13, p: "Me siento tenso(a) en mi hogar.", critico: false },
            { id: 14, p: "Me cuesta expresar lo que siento.", critico: false },
            { id: 15, p: "Me irrito con facilidad.", critico: false },
            { id: 16, p: "He cambiado mis hábitos de sueño o alimentación.", critico: false },
        ]
    };

    const inputEdad = document.getElementById('edad-paciente');
    const areaCuestionario = document.getElementById('area-cuestionario');
    const divResultado = document.getElementById('resultado');

    inputEdad.addEventListener('input', () => {
        const edad = parseInt(inputEdad.value);
        let rango = (edad >= 9 && edad <= 11) ? "9-11" : (edad >= 12 && edad <= 14) ? "12-14" : (edad >= 15 && edad <= 17) ? "15-17" : null;

        if (rango) {
            renderizarPreguntas(rango);
            divResultado.style.display = 'none';
        } else {
            areaCuestionario.innerHTML = edad ? "<p style='color:red; text-align:center;'>Fuera de rango GTE.</p>" : "";
        }
    });

    function renderizarPreguntas(rango) {
        areaCuestionario.innerHTML = `<h3 style="color:var(--blue); border-bottom:1px solid #eee; padding-bottom:10px;">Protocolo: ${rango} años</h3>`;
        bancosPreguntas[rango].forEach(pre => {
            const div = document.createElement('div');
            div.className = 'pregunta-card';
            div.innerHTML = `<p class="pregunta-texto"><strong>${pre.id}.</strong> ${pre.p}</p>${generarControl(rango, pre)}`;
            areaCuestionario.appendChild(div);
        });
    }

    function generarControl(rango, pre) {
        if (rango === "9-11") {
            return `<select class="respuesta-gte" data-id="${pre.id}" data-critico="${pre.critico}">
                <option value="">-- Seleccionar --</option>
                <option value="Si">Sí, casi siempre</option>
                <option value="AV">A veces</option>
                <option value="No">No, casi nunca</option>
            </select>`;
        }
        const max = (rango === "12-14") ? 4 : 5;
        return `<div style="display:flex; align-items:center; gap:10px;">
            <input type="range" class="respuesta-gte" data-id="${pre.id}" data-critico="${pre.critico}" data-inverso="${pre.inverso || false}" min="1" max="${max}" value="1" oninput="this.nextElementSibling.value = this.value" style="flex:1;">
            <output style="font-weight:bold; color:var(--orange); width:20px; text-align:right;">1</output>
        </div>`;
    }

    document.getElementById('boton-validar').addEventListener('click', () => {
        const edad = parseInt(inputEdad.value);
        const inputs = document.querySelectorAll('.respuesta-gte');
        
        if (!edad || inputs.length === 0) { alert("Ingrese datos."); return; }

        const respuestas = Array.from(inputs).map(i => {
            let val = i.tagName === 'SELECT' ? i.value : parseInt(i.value);
            if (i.dataset.inverso === "true") { val = (5 - val); } 
            return { id: parseInt(i.dataset.id), valor: val, esCritico: i.dataset.critico === "true" };
        });

        if (respuestas.some(r => r.valor === "" || r.valor === 0)) { alert("Complete todo."); return; }

        const fase = calcularFaseGTE(edad, respuestas);
        divResultado.style.display = 'block';
        divResultado.className = (fase === "Fase 3") ? "fase-3" : "fase-otras";
        divResultado.innerHTML = `<h3>${fase}</h3><p>Dictamen GTE</p>`;
        divResultado.scrollIntoView({ behavior: 'smooth' });
    });
</script>
</body>
</html>
